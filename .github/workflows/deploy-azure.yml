name: Deploy to Azure Web App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  DOTNET_VERSION: 10.0.x
  BUILD_CONFIGURATION: Release
  PUBLISH_PATH: publish-output

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore RegistraceOvcina.slnx

      - name: Publish web app
        run: dotnet publish src/RegistraceOvcina.Web/RegistraceOvcina.Web.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --output ${{ env.PUBLISH_PATH }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-webapp-package
          path: ${{ env.PUBLISH_PATH }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    environment:
      name: production

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: azure-webapp-package
          path: ${{ env.PUBLISH_PATH }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_PATH }}
